<!-- 主题切换按钮：插入到 topbar 右侧，sidebar 收起后仍可见 -->
<script>
(function () {
  function addThemeBtn() {
    if (document.getElementById('topbar-theme-btn')) return;

    var topbar = document.getElementById('topbar');
    if (!topbar) return;

    function isDark() {
      return document.documentElement.getAttribute('data-mode') === 'dark'
        || (!document.documentElement.hasAttribute('data-mode') && window.matchMedia('(prefers-color-scheme: dark)').matches);
    }

    var btn = document.createElement('button');
    btn.id = 'topbar-theme-btn';
    btn.title = '切换主题';
    btn.type = 'button';

    function updateIcon() {
      btn.innerHTML = isDark() ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    }
    updateIcon();

    btn.addEventListener('click', function (e) {
      e.preventDefault();
      e.stopPropagation();
      if (typeof Theme !== 'undefined' && Theme.flip) {
        Theme.flip();
      }
      setTimeout(updateIcon, 80);
    });

    var attrObserver = new MutationObserver(function () { updateIcon(); });
    attrObserver.observe(document.documentElement, {
      attributes: true,
      attributeFilter: ['data-mode']
    });

    topbar.appendChild(btn);
  }

  // 多时机触发，确保按钮一定被插入
  document.addEventListener('DOMContentLoaded', addThemeBtn);
  window.addEventListener('load', addThemeBtn);
  // 兜底：500ms 后再试一次（应对 defer 脚本重建 DOM 的情况）
  setTimeout(addThemeBtn, 500);
})();
</script>
